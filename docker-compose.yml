version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: app_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: app_api
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/app_db?schema=public
      NODE_ENV: production
      PORT: 3000
      API_KEY: secret-key
      SWAGGER_ENABLED: 'true'
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 30
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
